operation_characteristics:
  amount_ops:
    default: 1.0
  ac_n^3:
    default: 0
  ac_n^2:
    default: 0
  ac_n^1:
    default: 0
  out_mem_n^3:
    default: 0
  out_mem_n^2:
    default: 0
  out_mem_n^1:
    default: 0
  out_mem_const:
    default: 0

graph:
  variables:
    veldata_path: []
    veldata_with_regular_depth:
      - veldata
    veldata_with_irregular_depth:
      - veldata
    rec_coords_path: []
    rec_coords: []
    region_coords: []
    region: []
    velmodel: []
    eikonal_solve: []
    rec_coords_on_net: []
    travel_time_without_sc:
      - travel_time
    travel_time_with_sc:
      - travel_time
    traces_path: []
    raw_traces:
      - traces
      - filtered_traces
    merged_traces:
      - traces
      - filtered_traces
    freq_traces:
      - filtered_traces
    abs_traces:
      - filtered_traces
    hilb_traces:
       - filtered_traces
    stat_corrs: []
    traces_for_stat_corrs: []
    tensor: []
    cube_without_tensor_moment:
      - cube_without_cumsum
      - cube
    cube_with_tensor_moment:
      - cube_without_cumsum
      - cube
    cube_with_cumsum:
      - cube 
    detect_function: []
    raw_maxes:
      - maxes
    filtered_maxes:
       - maxes
    slices: []
    chart_detect_function: []
    chart_tt_at_traces: []
    chart_max_at_detect_function: []
    chart_maxes_at_timeline: []
    chart_maxes_at_square: []
    traces_to_merge: []

  operations:
    load_vel:
      inputs:
        - veldata_path
      outputs:
        - veldata_with_regular_depth
      characters:
        ac_n^1: 1
        out_mem_n^1: 1

    load_vel_with_deps:
      inputs:
        - veldata_path
      outputs:
        - veldata_with_irregular_depth
      characters:
        ac_n^1: 1
        out_mem_n^1: 1
  
    get_velmodel:
      inputs:
        - veldata
        - region
        - rec_coords
      outputs:
        - velmodel
      characters:
        ac_n^1: 2
        ac_n^2: 2
        out_mem_n^2: 1
    
    read_recs:
      inputs:
        - rec_coords_path
      outputs:
        - rec_coords
      characters:
        ac_n^1: 1
        out_mem_n^1: 1
    
    get_coords_on_net:
      inputs:
        - rec_coords
        - region
      outputs:
        - rec_coords_on_net
      characters:
        ac_n^2: 1
        out_mem_n^1: 1
    
    create_region:
      inputs:
        - region_coords
      outputs:
        - region
      characters:
        ac_n^2: 1
        out_mem_n^2: 1
    
    solve_eikonal:
      inputs:
        - velmodel
      outputs:
        - eikonal_solve
      characters:
        ac_n^2: 1
        out_mem_n^2: 1
    
    get_travel_time:
      inputs:
        - eikonal_solve
        - rec_coords_on_net
      outputs:
        - travel_time_without_sc
      characters:
        ac_n^2: 2
        out_mem_n^2: 1
    
    read_traces:
      inputs:
        - traces_path
      outputs:
        - raw_traces
      characters:
        ac_n^2: 1
        out_mem_n^2: 1

    merge_traces:
      inputs:
        - raw_traces
        - traces_to_merge
      outputs:
        - merged_traces
      characters:
        ac_n^2: 1
        out_mem_n^2: 1
    
    frequency_filtration:
      inputs:
        - traces
      outputs:
        - freq_traces
      characters:
        ac_n^2: 1
        out_mem_n^2: 1
      
    abs_filtration:
      inputs:
        - traces
      outputs:
        - abs_traces
      characters:
        ac_n^2: 1
        out_mem_n^2: 1

    hilb_filtration:
      inputs:
        - traces
      outputs:
        - hilb_traces
      characters:
        ac_n^2: 1
        out_mem_n^2: 1

    get_stat_corrs:
      inputs:
        - traces_for_stat_corrs
        - region
        - travel_time_without_sc
      outputs:
        - stat_corrs
      characters:
        ac_n^3: 1
        out_mem_n^1: 1
      

    apply_stat_corrs:
      inputs:
        - travel_time_without_sc
        - stat_corrs
      outputs:
        - travel_time_with_sc
      characters:
        ac_n^2: 1
        out_mem_n^2: 1

    get_cube:
      inputs:
        - travel_time
        - filtered_traces
        - region
      outputs:
        - cube_without_tensor_moment
      characters:
        ac_n^3: 1
        out_mem_n^3: 1
    
    get_cube_with_tensor:
      inputs:
        - travel_time
        - filtered_traces
        - region
        - tensor
      outputs:
        - cube_with_tensor_moment
      characters:
        ac_n^3: 1
        out_mem_n^3: 1
    
    get_cumsum:
      inputs:
       - cube_without_cumsum
      outputs:
       - cube_with_cumsum
      characters:
        ac_n^2: 1
        out_mem_n^3: 1
    
    get_detect_function:
      inputs:
        - cube
      outputs:
        - detect_function
      characters:
        ac_n^2: 1
        out_mem_n^1: 1
    
    get_maxes:
      inputs:
        - cube
        - detect_function
        - region
      outputs:
        - raw_maxes
      characters:
        ac_n^2: 1
        out_mem_n^1: 1

    filter_maxes:
      inputs:
        - raw_maxes
      outputs:
        - filtered_maxes
      characters:
        ac_n^2: 1
        out_mem_n^1: 1
    
    get_slice:
      inputs:
        - maxes
        - cube
        - region
        - rec_coords
      outputs:
        - slices
      characters:
        ac_n^2: 1
        out_mem_const: 1
    
    plot_detect_function:
      inputs:
        - detect_function
      outputs:
        - chart_detect_function
      characters:
        ac_n^1: 1
        out_mem_const: 1
    
    draw_tt_at_traces:
      inputs:
        - maxes
        - filtered_traces
        - travel_time
        - region
      outputs:
        - chart_tt_at_traces_wo_sc
      characters:
        ac_n^3: 1
        out_mem_const: 1
    
    draw_maxes_at_detect_function:
      inputs:
        - detect_function
        - maxes
      outputs:
        - chart_max_at_detect_function
      characters:
        ac_n^2: 1
        out_mem_const: 1
    
    draw_maxes_at_timeline:
      inputs:
        - maxes
      outputs:
        - chart_maxes_at_timeline
      characters:
        ac_n^1: 1
        out_mem_const: 1
    
    draw_maxes_at_square:
      inputs:
        - maxes
        - region
      outputs:
        - chart_maxes_at_square
      characters:
        ac_n^1: 1
        out_mem_const: 1