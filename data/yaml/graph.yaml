operation_characteristics:
  diff:
    default: 1.0

graph:
  variables:
    veldata_path: []
    veldata_with_regular_depth:
      - veldata
    veldata_with_irregular_depth:
      - veldata
    rec_coords_path: []
    rec_coords: []
    region_coords: []
    region: []
    velmodel: []
    eikonal_solve: []
    rec_coords_on_net: []
    travel_time_without_sc:
      - travel_time
    travel_time_with_sc:
      - travel_time
    traces_path: []
    raw_traces:
      - traces
      - filtered_traces
    merged_traces:
      - traces
      - filtered_traces
    freq_traces:
      - filtered_traces
    abs_traces:
      - filtered_traces
    hilb_traces:
       - filtered_traces
    stat_corrs: []
    traces_for_stat_corrs: []
    tensor: []
    cube_without_tensor_moment:
      - cube_without_cumsum
      - cube
    cube_with_tensor_moment:
      - cube_without_cumsum
      - cube
    cube_with_cumsum:
      - cube 
    detect_function: []
    raw_maxes:
      - maxes
    filtered_maxes:
       - maxes
    slices: []
    chart_detect_function: []
    chart_tt_at_traces: []
    chart_max_at_detect_function: []
    chart_maxes_at_timeline: []
    chart_maxes_at_square: []

  operations:
    load_vel:
      inputs:
        veldata_path: name
      outputs:
        - veldata_with_irregular_depth

    load_vel_with_deps:
      inputs:
        veldata_path: name
      outputs:
        - veldata_with_regular_depth
  
    get_velmodel:
      inputs:
        veldata: class
        region: name
        rec_coords: name
      outputs:
        - velmodel
    
    read_recs:
      inputs:
        rec_coords_path: name
      outputs:
        - rec_coords
    
    get_coords_on_net:
      inputs:
        rec_coords: name
        region: name
      outputs:
        - rec_coords_on_net
    
    create_region:
      inputs:
        region_coords: name
      outputs:
        - region
    
    solve_eikonal:
      inputs:
        velmodel: name
      outputs:
        - eikonal_solve
    
    get_travel_time:
      inputs:
        eikonal_solve: name
        rec_coords_on_net: name
      outputs:
        - travel_time_without_sc
    
    read_traces:
      inputs:
        traces_path: name
      outputs:
        - raw_traces

    merge_traces:
      inputs:
        raw_traces: name
      outputs:
        - merged_traces
    
    frequency_filtration:
      inputs:
        traces: class
      outputs:
        - freq_traces
      
    abs_filtration:
      inputs:
        traces: class
      outputs:
        - abs_traces

    hilb_filtration:
      inputs:
        traces: class
      outputs:
        - hilb_traces

    get_stat_corrs:
      inputs:
        traces_for_stat_corrs: name
        region: name
        travel_time_without_sc: name
      outputs:
        - stat_corrs
      

    apply_stat_corrs:
      inputs:
        travel_time_without_sc: name
        stat_corrs: name
      outputs:
        - travel_time_with_sc

    get_cube:
      inputs:
        travel_time: class
        filtered_traces: class
        region: name
      outputs:
        - cube_without_tensor_moment
    
    get_cube_with_tensor:
      inputs:
        travel_time: name
        filtered_traces: class
        region: name
        tensor: name
      outputs:
        - cube_with_tensor_moment
    
    get_cumsum:
      inputs:
        cube_without_cumsum: class
      outputs:
       - cube_with_cumsum
    
    get_detect_function:
      inputs:
        cube: class
      outputs:
        - detect_function
    
    get_maxes:
      inputs:
        cube: class
        detect_function: name
        region: name
      outputs:
        - raw_maxes

    filter_maxes:
      inputs:
        raw_maxes: name
      outputs:
        - filtered_maxes
    
    get_slice:
      inputs:
        maxes: class
        cube: name
        region: name
        rec_coords: name
      outputs:
        - slices
    
    plot_detect_function:
      inputs:
        detect_function: name
      outputs:
        - chart_detect_function
    
    draw_tt_at_traces:
      inputs:
        maxes: class
        filtered_traces: class
        travel_time: name
        region: name
      outputs:
        - chart_tt_at_traces
    
    draw_maxes_at_detect_function:
      inputs:
        detect_function: name
        maxes: class
      outputs:
        - chart_max_at_detect_function
    
    draw_maxes_at_timeline:
      inputs:
        maxes: class
      outputs:
        - chart_maxes_at_timeline
    
    draw_maxes_at_square:
      inputs:
        maxes: class
      outputs:
        - chart_maxes_at_square