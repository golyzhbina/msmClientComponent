operation_characteristics:
  diff:
    default: 1.0

graph:
  variables:
    veldata_path:
      class:
        - veldata_path
    veldata:
      class:
        - veldata
    rec_coords_path:
      class:
        - rec_coords_path
    rec_coords:
      class:
        - rec_coords
    region_coords:
      class:
        - region_coords
    region:
      class:
        - region
    velmodel:
      class:
        - velmodel
    eikonal_solve:
      class:
        - eikonal_solve
    rec_coords_on_net:
      class:
        - rec_coords_on_net
    travel_time:
      class:
        - travel_time
    traces_path:
      class:
        - traces_path
    raw_traces:
      class:
        - traces
    merged_traces:
      class:
        - traces
        - traces_without_stat_corrs
    freq_traces:
      class:
        - filtered_traces
        - traces_without_stat_corrs
    abs_traces:
      class:
        - filtered_traces
        - traces_without_stat_corrs
    hilb_traces:
      class:
        - filtered_traces
        - traces_without_stat_corrs
    stat_corrs:
      class:
       - stat_corrs
    traces_with_sc:
      class:
        - filtered_traces
    tensor:
      class:
        - tensor
    cube_without_tensor_moment:
      class:
        - cube_without_cumsum
        - cube
    cube_with_tensor_moment:
      class:
        - cube_without_cumsum
        - cube
    cube_with_cumsum:
      class:
        - cube 
    detect_function:
      class:
        - detect_function
    raw_maxes:
      class:
        - maxes
    filtered_maxes:
      class:
        - maxes
    slices:
      class:
        - slices
    chart_detect_function:
      class:
        - chart_detect_function
    chart_tt_at_traces:
      class:
        - chart_tt_at_traces
    chart_max_at_detect_function:
      class:
        - chart_max_at_detect_function
    chart_maxes_at_timeline:
      class:
        - chart_maxes_at_timeline
    chart_maxes_at_square:
      class:
        - chart_maxes_at_square

  operations:
    load_veldata:
      class: load_veldata
      characters:
        diff: 1
      inputs:
        veldata_path: name
      outputs:
        - veldata
  
    get_velmodel:
      class: get_velmodel
      characters:
        diff: 1
      inputs:
        veldata: name
        region: name
        rec_coords: name
      outputs:
        - velmodel
    
    read_recs:
      class: read_recs
      characters:
        diff: 1
      inputs:
        rec_coords_path: name
      outputs:
        - rec_coords
    
    get_coords_on_net:
      class: get_coords_on_net
      characters:
        diff: 1
      inputs:
        rec_coords: name
        region: name
      outputs:
        - rec_coords_on_net
    
    create_region:
      class: create_region
      characters:
        diff: 1
      inputs:
        region_coords: name
      outputs:
        - region
    
    solve_eikonal:
      class: solve_eikonal
      characters:
        diff: 1
      inputs:
        velmodel: name
      outputs:
        - eikonal_solve
    
    get_travel_time:
      class: get_travel_time
      characters:
        diff: 1
      inputs:
        eikonal_solve: name
        rec_coords_on_net: name
      outputs:
        - travel_time
    
    read_traces:
      class: read_traces
      characters:
        diff: 1
      inputs:
        traces_path: name
      outputs:
        - raw_traces

    merge_traces:
      class: merge_traces
      characters:
        diff: 1
      inputs:
        raw_traces: name
      outputs:
        - merged_traces
    
    frequency_filtration:
      class: preprocess_traces
      characters:
        diff: 1
      inputs:
        traces: class
      outputs:
        - freq_traces
      
    abs_filtration:
      class: preprocess_traces
      characters:
        diff: 1
      inputs:
        traces: class
      outputs:
        - abs_traces

    hilb_filtration:
      class: preprocess_traces
      characters:
        diff: 1
      inputs:
        traces: class
      outputs:
        - hilb_traces

    get_stat_corrs:
      class: "get_stat_corrs"
      characters:
        diff: 1
      inputs:
        traces_without_stat_corrs: class
      outputs:
        - stat_corrs
      

    apply_stat_corrs:
      class: preprocess_traces
      characters:
        diff: 1
      inputs:
        stat_corrs: name
        traces_without_stat_corrs: class
      outputs:
        - traces_with_sc

    get_cube:
      class: get_cube
      characters:
        diff: 1
      inputs:
        travel_time: name
        filtered_traces: class
        region: name
      outputs:
        - cube_without_tensor_moment
    
    get_cube_with_tensor:
      class: get_cube_with_tensor
      characters:
        diff: 1
      inputs:
        travel_time: name
        filtered_traces: class
        region: name
        tensor: name
      outputs:
        - cube_with_tensor_moment
    
    get_cumsum:
      class: get_cumsum
      characters:
        diff: 1
      inputs:
        cube_without_cumsum: class
      outputs:
       - cube_with_cumsum
    
    get_detect_function:
      class: get_detect_function
      characters:
        diff: 1
      inputs:
        cube: class
      outputs:
        - detect_function
    
    get_maxes:
      class: get_maxes
      characters:
        diff: 1
      inputs:
        cube: class
        detect_function: name
        region: name
      outputs:
        - raw_maxes

    filter_maxes:
      class: filtered_maxes
      characters:
        diff: 1
      inputs:
        raw_maxes: name
      outputs:
        - filtered_maxes
      
    
    get_slice:
      class: get_slice
      characters:
        diff: 1
      inputs:
        maxes: class
        cube: name
        region: name
        rec_coords: name
      outputs:
        - slices
    
    plot_detect_function:
      class: plot_detect_function
      characters:
        diff: 1
      inputs:
        detect_function: name
      outputs:
        - chart_detect_function
    
    draw_tt_at_traces:
      class: draw_tt_at_traces
      characters:
        diff: 1
      inputs:
        maxes: class
        filtered_traces: class
        travel_time: name
        region: name
      outputs:
        - chart_tt_at_traces
    
    draw_maxes_at_detect_function:
      class: draw_maxes_at_detect_function
      characters:
        diff: 1
      inputs:
        detect_function: name
        maxes: class
      outputs:
        - chart_max_at_detect_function
    
    draw_maxes_at_timeline:
      class: draw_all_maxes_at_timeline
      characters:
        diff: 1
      inputs:
        maxes: class
      outputs:
        - chart_maxes_at_timeline
    
    draw_maxes_at_square:
      class: draw_all_maxes_at_square
      characters:
        diff: 1
      inputs:
        maxes: class
      outputs:
        - chart_maxes_at_square

        

    