operation_characteristics:
  diff:
    default: 1.0

graph:
  variables:
    veldata_path: []
    veldata_with_regular_depth:
      - veldata
    veldata_with_irregular_depth:
      - veldata
    rec_coords_path: []
    rec_coords: []
    region_coords: []
    region: []
    velmodel: []
    eikonal_solve: []
    rec_coords_on_net: []
    travel_time_without_sc:
      - travel_time
    travel_time_with_sc:
      - travel_time
    traces_path: []
    raw_traces:
      - traces
      - filtered_traces
    merged_traces:
      - traces
      - filtered_traces
    freq_traces:
      - filtered_traces
    abs_traces:
      - filtered_traces
    hilb_traces:
       - filtered_traces
    stat_corrs: []
    traces_for_stat_corrs: []
    tensor: []
    cube_without_tensor_moment:
      - cube_without_cumsum
      - cube
    cube_with_tensor_moment:
      - cube_without_cumsum
      - cube
    cube_with_cumsum:
      - cube 
    detect_function: []
    raw_maxes:
      - maxes
    filtered_maxes:
       - maxes
    slices: []
    chart_detect_function: []
    chart_tt_at_traces: []
    chart_max_at_detect_function: []
    chart_maxes_at_timeline: []
    chart_maxes_at_square: []

  operations:
    load_vel:
      inputs:
        - veldata_path
      outputs:
        - veldata_with_regular_depth

    load_vel_with_deps:
      inputs:
        - veldata_path
      outputs:
        - veldata_with_irregular_depth
  
    get_velmodel:
      inputs:
        - veldata
        - region
        - rec_coords
      outputs:
        - velmodel
    
    read_recs:
      inputs:
        - rec_coords_path
      outputs:
        - rec_coords
    
    get_coords_on_net:
      inputs:
        - rec_coords
        - region
      outputs:
        - rec_coords_on_net
    
    create_region:
      inputs:
        - region_coords
      outputs:
        - region
    
    solve_eikonal:
      inputs:
        - velmodel
      outputs:
        - eikonal_solve
    
    get_travel_time:
      inputs:
        - eikonal_solve
        - rec_coords_on_net
      outputs:
        - travel_time_without_sc
    
    read_traces:
      inputs:
        - traces_path
      outputs:
        - raw_traces

    merge_traces:
      inputs:
        - raw_traces
      outputs:
        - merged_traces
    
    frequency_filtration:
      inputs:
        - traces
      outputs:
        - freq_traces
      
    abs_filtration:
      inputs:
        - traces
      outputs:
        - abs_traces

    hilb_filtration:
      inputs:
        - traces
      outputs:
        - hilb_traces

    get_stat_corrs:
      inputs:
        - traces_for_stat_corrs
        - region
        - travel_time_without_sc
      outputs:
        - stat_corrs
      

    apply_stat_corrs:
      inputs:
        - travel_time_without_sc
        - stat_corrs
      outputs:
        - travel_time_with_sc

    get_cube:
      inputs:
        - travel_time
        - filtered_traces
        - region
      outputs:
        - cube_without_tensor_moment
    
    get_cube_with_tensor:
      inputs:
        - travel_time
        - filtered_traces
        - region
        - tensor
      outputs:
        - cube_with_tensor_moment
    
    get_cumsum:
      inputs:
       - cube_without_cumsum
      outputs:
       - cube_with_cumsum
    
    get_detect_function:
      inputs:
        - cube
      outputs:
        - detect_function
    
    get_maxes:
      inputs:
        - cube
        - detect_function
        - region
      outputs:
        - raw_maxes

    filter_maxes:
      inputs:
        - raw_maxes
      outputs:
        - filtered_maxes
    
    get_slice:
      inputs:
        - maxes
        - cube
        - region
        - rec_coords
      outputs:
        - slices
    
    plot_detect_function:
      inputs:
        - detect_function
      outputs:
        - chart_detect_function
    
    draw_tt_at_traces:
      inputs:
        - maxes
        - filtered_traces
        - travel_time
        - region
      outputs:
        - chart_tt_at_traces
    
    draw_maxes_at_detect_function:
      inputs:
        - detect_function
        - maxes
      outputs:
        - chart_max_at_detect_function
    
    draw_maxes_at_timeline:
      inputs:
        - maxes
      outputs:
        - chart_maxes_at_timeline
    
    draw_maxes_at_square:
      inputs:
        - maxes
      outputs:
        - chart_maxes_at_square