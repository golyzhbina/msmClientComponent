load_vel:
  type: "map"
  scalar_wrapper: parsing_load_vel 
  description: "reads a one-dimensional NPY-array of velocities and create regular array of depths from -len(vel) * step to 0 with specifed step"
  variables:
    veldata_path:
      name: "veldata_path"
      description: "path to npy-array with speeds and depths"
      type: "str"
    step_by_depth:
      description: "step by depths"
      type: "i32"

load_vel_with_deps:
  type: "map"
  declaration_url: "ops/parsing_load_vel_with_deps/declaration.toml"
  scalar_wrapper: parsing_load_vel_with_deps 
  description: ""
  variables:
    veldata_path:
      name: "veldata_path"
      description: "path to npy-array with speeds and depths"
      type: "str"
    
read_recs:
  type: "map"
  declaration_url: "ops/parsing_read_rec_coords/declaration.toml"
  scalar_wrapper: parsing_read_rec_coords
  description: "read receivers coordinates"
  variables:
    rc_data_path:
      name: "rec_coords_path"
      description: ""
      type: "str"

get_coords_on_net:
  type: "map"
  scalar_wrapper: parsing_get_coords_on_net
  declaration_url: "ops/parsing_get_coords_on_net/declaration.toml"
  variables:
    rec_coords_path:
      name: "rec_coords"
      description: "path to receivers coords object"
      type: "str"
    region_path:
      name: "region"
      description: "path to region object"
      type: "str"

create_region:
  type: "map"
  scalar_wrapper: region_create_region
  declaration_url: "ops/region_create_region/declaration.toml"
  variables:
    net_coords: 
      name: "region_coords"
      type: "[i32]"
      description: "list of four elements - grid coordinates [X1, Y1, X2, Y2]"
    step_by_region:
      type: "i32"

get_velmodel:
  type: "map"
  scalar_wrapper: model_get_velmodel
  declaration_url: "ops/model_get_velmodel/declaration.toml"
  variables:
    depths_vel_path:
      name: "veldata"
      description: "path to veldata object"
      type: "str"
    rec_coords_path:
      type: "str"
      name: "rec_coords"
      description: "path to receivers coords object"
      type: "str"
    region_path:
      name: "region"
      description: "path to region object"
      type: "str"
    step_vel_model: 
      type: "i32"

solve_eikonal:
  type: "map"
  scalar_wrapper: tt_solve_eikonal
  declaration_url: "ops/tt_solve_eikonal/declaration.toml"
  description: "solve eikonal equation"
  variables:
    model_path:
      name: "velmodel"
      description: "path to vel model object"
      type: "str"
    source:
      type: "i32"
      description: "calibration explosion depth"

get_travel_time:
  type: "map"
  scalar_wrapper: tt_get_travel_time
  declaration_url: "ops/tt_get_travel_time/declaration.toml"
  description: "obtaining an array of travel times from each receiver to each source based on the solution of the eikonal equation"
  variables:
    esolve_path:
      name: "eikonal_solve"
      description: "path to eikonal solve object"
      type: "str"
    rec_coords_path:
      type: "str"
      name: "rec_coords_on_net"
      description: "path to receivers coords object"
    traces_dt: 
      description: "trace sampling frequency in milliseconds"
      type: "i32"

read_traces:
  type: "map"
  scalar_wrapper: read_traces
  declaration_url: "ops/traces_read_traces/declaration.toml"
  description: ""
  variables:
    filename:
      name: "traces_path"
      description: "path to SGY-file"
      type: "str"
    normalize:
      type: "bool"
      default: false
      description: "if the value is True, then each trace is normalized to the maximum value"
  expand: "filename"

get_stat_corrs:
  type: "map"
  scalar_wrapper: get_stat_corrs
  declaration_url: "ops/stat_corrs_get_stat_corrs/declaration.toml"
  description: ""
  variables:
    traces_path: 
      name: "traces_for_stat_corrs"
      type: "str"
      description: "path to traces obj"
    region_path:
      type: "str"
      description: "path to region object"
      name: "region"
    travel_time_path:
      type: "str"
      description: "path to travel time object"
      name: "travel_time_without_sc"
    window_size:
      type: "i32"
      decription: "max corrections"
    amount_iter:
      type: "i32"
      decription: ""
    batch_size:
      type: "i32"
      decription: "amount traces for calculate etalon"
    time_interval:
      type: "List[int]"
      decription: ""
    subtrahend:
      type: "int"
      description: "the value by which the maximum static correction is reduced after each iteration"
    source_coords:
      type: "List[int]"
      description: "two coords of source"
    

apply_stat_corrs:
  type: "map"
  scalar_wrapper: stat_corrs_add_static_correction
  declaration_url: "ops/stat_corrs_add_static_correction/declaration.toml"
  func_path: "msm_dags_ops.stat_cors_wrappers.apply_stat_cors_helper"
  description: ""
  variables:
    travel_time_path: 
      name: "travel_time_without_sc"
      type: "str"
      description: "path to travel time obj"
    stat_cors_path:
      name: "stat_corrs"
      type: "str"
      description: "path to stat corrs obj"

hilb_filtration:
  type: "map"
  scalar_wrapper: traces_hilb_filtration
  declaration_url: "ops/traces_hilb_filtration/declaration.toml"
  description: ""
  variables:
    traces_path:
      name: "traces"
      type: "str"
      description: "path to traces obj"
  expand: "traces_path"

abs_filtration:
  type: "map"
  scalar_wrapper: traces_abs_filtration
  declaration_url: "ops/traces_abs_filtration/declaration.toml"
  description: ""
  variables:
    traces_path:
      name: "traces"
      type: "str"
      description: "path to traces obj"
  expand: "traces_path"

frequency_filtration:
  type: "map"
  scalar_wrapper: traces_frequency_filtration
  declaration_url: "ops/traces_frequency_filtration/declaration.toml"
  description: ""
  variables:
    traces_path:
      name: "traces"
      type: "str"
      description: "path to traces obj"
  expand: "traces_path"

merge_traces:
  type: "map"
  scalar_wrapper: traces_merge_traces
  declaration_url: "ops/traces_merge_traces/declaration.toml"
  description: ""
  variables:
    traces1_path:
      name: "raw_traces"
      type: "str"
      description: "path to main traces obj"
    traces2_path:
      type: "str"
      description: "path to additional traces obj"
    part_size:
      type: "i32"
      description: "number of loaded traces"

get_cube:
  type: "map"
  scalar_wrapper: cube_get_cube
  declaration_url: "ops/cube_get_cube/declaration.toml"
  description: "coherent summation"
  variables:
    traces_path:
      name: "filtered_traces"
      description: "path to filtered traces object"
      type: "str"
    travel_time_path:
      name: "travel_time"
      description: "path to travel time object"
      type: "str"
    region_path:
      name: "region"
      description: "path to region object"
      type: "str"
    time_i32erval:
      type: "[i32]"
      description: "summation time i32erval"
  expand: traces_path

get_cube_with_tensor:
  type: "map"
  scalar_wrapper: cube_get_cube_with_tm
  declaration_url: "ops/cube_get_cube_with_tm/declaration.toml"
  description: "coherent summation with tensor moment"
  variables:
    traces_path:
      type: "str"
      name: "filtered_traces"
      description: ""
    travel_time_path:
      name: "travel_time"
      description: ""
      type: str
    region_path:
      name: "region"
      description: ""
      type: str
    tensor:
      name: "tensor"
      description: ""
      type: "[i32]"
    time_i32erval:
      type: "[i32]"
      description: "summation time i32erval"

get_cumsum:
  type: "map"
  scalar_wrapper: cube_get_cumsum
  declaration_url: "ops/cube_get_cumsum/declaration.toml"
  description: "cumulative summation with a window of kernel_size"
  variables:
    cube_path:
      name: "cube_without_cumsum"
      type: "str"
      description: "path to cube object"
    kernel_size:
      type: "i32"
      description: ""
    zero_padding:
      type: bool
      default: false
      description: "If the parameter is True, then kernel_size zeros are added to the end of each cube trace"

get_slice:
  type: "map"
  scalar_wrapper: interpret_get_slices
  declaration_url: "ops/i32erpret_get_slices/declaration.toml"
  description: "constructs slices of a cube by time at its maxima"
  variables:
    cube_path:
      name: "cube"
      description: "path to cube obj"
      type: "str"
    maxes_path:
      name: "maxes"
      description: "path to maxes obj"
      type: "str"
    region_path:
      name: "region"
      description: "path to region obj"
      type: "str"
    rec_coords_on_net_path:
      name: "rec_coords"
      description: "path to receivers coords obj"
      type: "str"

get_detect_function:
  type: "map"
  scalar_wrapper: interpret_get_detect_func
  declaration_url: "ops/i32erpret_get_detect_func/declaration.toml"
  description: "obtains maximum cube values ​​along the time axis"
  variables:
    cube_path:
      name: "cube"
